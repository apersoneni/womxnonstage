<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');

  .flyer-scale {
    transform-origin: center center;
  }
  .flyer {

  .title { font-family: 'Cinzel Decorative', serif; font-size: 4.8rem; font-weight: 900; line-height: 0.88; text-align: center; background: linear-gradient(135deg, #f0d888 0%, #f4c8a8 30%, #d0b8f0 65%, #e0a8cc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; filter: drop-shadow(0 4px 20px rgba(201,168,76,0.18)); }

  .diamond { color: #c9a84c; font-size: 1rem; margin: 0.1rem 0 1.2rem; }

  .time { font-family: 'Cinzel Decorative', serif; font-size: 1rem; letter-spacing: 0.28em; color: #e8cc82; margin-bottom: 1rem; }
  .ticket { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase; color: #5ed8d2; margin-bottom: 1rem; }
  .tagline { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.15rem; font-style: italic; color: #c4aee8; text-align: center; line-height: 1.7; margin-bottom: 1.2rem; }
