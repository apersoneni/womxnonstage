<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOMXN ON STAGE QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8d5f0 0%, #d4b8e8 50%, #c9a8e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2.5em;
            color: #1a1a1a;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 1.1em;
            color: #6b5b95;
            font-style: italic;
            margin-bottom: 30px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 15px;
        }

        .url {
            font-size: 0.9em;
            color: #666;
            word-break: break-all;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            border-left: 4px solid #d946a6;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-download {
            background: linear-gradient(135deg, #d946a6 0%, #a855f7 100%);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(217, 70, 166, 0.4);
        }

        .btn-visit {
            background: #f0f0f0;
            color: #1a1a1a;
            border: 2px solid #d946a6;
        }

        .btn-visit:hover {
            background: #d946a6;
            color: white;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.85em;
            color: #999;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .container {
                padding: 30px 20px;
            }

            button {
                padding: 10px 15px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WOMXN ON STAGE</h1>
        <p class="tagline">Sing it. Paint it. Pitch it. Own it.</p>
        
        <p class="url">https://apersoneni.github.io/womxnonstage/</p>
        
        <div id="qrcode"></div>
        
        <div class="button-group">
            <button class="btn-download" onclick="downloadQR()">⬇️ Download QR Code</button>
            <button class="btn-visit" onclick="visitSite()">🔗 Visit Site</button>
        </div>
        
        <p class="footer-text">Scan this QR code to visit all 13 editions and follow our artists!</p>
    </div>

    <script>
        // Generate QR Code
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://apersoneni.github.io/womxnonstage/",
            width: 300,
            height: 300,
            colorDark: "#1a1a1a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function downloadQR() {
            const canvas = document.querySelector("#qrcode canvas");
            const link = document.createElement("a");
            link.href = canvas.toDataURL("image/png");
            link.download = "womxnonstage-qr-code.png";
            link.click();
        }

        function visitSite() {
            window.open("https://apersoneni.github.io/womxnonstage/", "_blank");
        }
    </script>
</body>
</html>
